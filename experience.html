  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

if; font-size:24px; font-weight:600; color:#04162c;\">Aritz Tusell<\u002Fa>\n      <div style=\"display:flex; gap:32px; align-items:center;\">\n        <a href=\"index.html\" style=\"font-size:14px; font-weight:600; letter-spacing:0.05em; color:#44474d;\" style-hover=\"color:#A68966;\">Home<\u002Fa>\n        <a href=\"experience.html\" style=\"font-size:14px; font-weight:600; letter-spacing:0.05em; color:#04162c; border-bottom:2px solid #04162c; padding-bottom:4px;\">Experience<\u002Fa>\n        <a href=\"services.html\" style=\"font-size:14px; font-weight:600; letter-spacing:0.05em; color:#44474d;\" style-hover=\"color:#A68966;\">Services<\u002Fa>\n        <a href=\"contact.html\" style=\"font-size:14px; font-weight:600; letter-spacing:0.05em; color:#44474d;\" style-hover=\"color:#A68966;\">Contact<\u002Fa>\n        <a href=\"contact.html\" style=\"background:#04162c; color:#F9F8F6; font-size:14px; font-weight:600; letter-spacing:0.05em; padding:11px 22px; border-radius:8px;\" style-hover=\"background:#02172a; color:#F9F8F6;\">Let's Talk<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- HEADER -->\n  <section style=\"max-width:1140px; margin:0 auto; padding:80px 40px 56px;\">\n    <h1 style=\"font-family:'Playfair Display',serif; font-size:58px; font-weight:700; letter-spacing:-0.02em; color:#04162c; margin:0 0 24px;\">Experience &amp; Expertise<\u002Fh1>\n    <p style=\"font-size:18px; line-height:1.65; color:#44474d; max-width:720px; margin:0;\">Fifteen-plus years spanning engineering leadership and hands-on development — leading multidisciplinary teams, architecting resilient systems, and building large-scale data-extraction pipelines end to end.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- BODY: timeline + sidebar -->\n  <section style=\"max-width:1140px; margin:0 auto; padding:0 40px 40px; display:grid; grid-template-columns:1fr 340px; gap:56px; align-items:start;\">\n\n    <!-- TIMELINE -->\n    <div>\n      <div style=\"display:flex; align-items:center; gap:12px; border-bottom:1px solid #E2E2E2; padding-bottom:16px; margin-bottom:36px;\">\n        <h2 style=\"font-family:'Playfair Display',serif; font-size:26px; font-weight:600; color:#04162c; margin:0;\">Professional Journey<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:24px;\">\n\n        <div style=\"background:#fff; border:1px solid #E2E2E2; border-radius:16px; padding:32px; box-shadow:0 4px 12px rgba(26,43,66,0.05);\">\n          <div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:16px; flex-wrap:wrap;\">\n            <h3 style=\"font-family:'Playfair Display',serif; font-size:23px; font-weight:600; color:#04162c; margin:0;\">Technical Engineering Manager<\u002Fh3>\n            <span style=\"font-size:14px; font-weight:600; color:#A68966; white-space:nowrap;\">2023 — Present<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:14px; font-weight:600; letter-spacing:0.03em; color:#4A5D73; margin:6px 0 16px;\">HelioVolta / Solargrade · Remote<\u002Fdiv>\n          <p style=\"font-size:15px; line-height:1.6; color:#44474d; margin:0 0 18px;\">Leading and mentoring a multidisciplinary team of backend and frontend engineers through the full development lifecycle. Overseeing end-to-end architecture and delivery of a mission-critical mobile application for in-field incident management and reporting for commercial solar plant operators. Accountable for the complete technical stack and all associated cloud infrastructure and deployment pipelines on Azure.<\u002Fp>\n          <div style=\"display:flex; flex-wrap:wrap; gap:8px;\">\n            <span style=\"background:rgba(74,93,115,0.1); color:#4A5D73; font-size:12px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; padding:5px 11px; border-radius:6px;\">Python<\u002Fspan>\n            <span style=\"background:rgba(74,93,115,0.1); color:#4A5D73; font-size:12px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; padding:5px 11px; border-radius:6px;\">Django<\u002Fspan>\n            <span style=\"background:rgba(74,93,115,0.1); color:#4A5D73; font-size:12px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; padding:5px 11px; border-radius:6px;\">Angular<\u002Fspan>\n            <span style=\"background:rgba(74,93,115,0.1); color:#4A5D73; font-size:12px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; padding:5px 11px; border-radius:6px;\">Azure<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#fff; border:1px solid #E2E2E2; border-radius:16px; padding:32px; box-shadow:0 4px 12px rgba(26,43,66,0.05);\">\n          <div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:16px; flex-wrap:wrap;\">\n            <h3 style=\"font-family:'Playfair Display',serif; font-size:23px; font-weight:600; color:#04162c; margin:0;\">Fullstack &amp; Data Scraping Specialist<\u002Fh3>\n            <span style=\"font-size:14px; font-weight:600; color:#A68966; white-space:nowrap;\">2012 — Present<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:14px; font-weight:600; letter-spacing:0.03em; color:#4A5D73; margin:6px 0 16px;\">Freelance · Remote<\u002Fdiv>\n          <p style=\"font-size:15px; line-height:1.6; color:#44474d; margin:0 0 18px;\">Strategic consulting and full-stack development for clients, specializing in the architecture of custom data-extraction and processing pipelines. Managing large-scale data-harvesting projects with a strong emphasis on cleaning, normalization and structuring to deliver high-quality, usable datasets — including robust transformation pipelines for complex content migrations from obfuscated sites and undocumented APIs.<\u002Fp>\n          <div style=\"display:flex; flex-wrap:wrap; gap:8px;\">\n            <span style=\"background:rgba(74,93,115,0.1); color:#4A5D73; font-size:12px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; padding:5px 11px; border-radius:6px;\">Consulting<\u002Fspan>\n            <span style=\"background:rgba(74,93,115,0.1); color:#4A5D73; font-size:12px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; padding:5px 11px; border-radius:6px;\">Data Pipelines<\u002Fspan>\n            <span style=\"background:rgba(74,93,115,0.1); color:#4A5D73; font-size:12px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; padding:5px 11px; border-radius:6px;\">Migrations<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#fff; border:1px solid #E2E2E2; border-radius:16px; padding:32px; box-shadow:0 4px 12px rgba(26,43,66,0.05);\">\n          <div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:16px; flex-wrap:wrap;\">\n            <h3 style=\"font-family:'Playfair Display',serif; font-size:23px; font-weight:600; color:#04162c; margin:0;\">Senior Data Extraction Engineer<\u002Fh3>\n            <span style=\"font-size:14px; font-weight:600; color:#A68966; white-space:nowrap;\">2022 — 2023<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:14px; font-weight:600; letter-spacing:0.03em; color:#4A5D73; margin:6px 0 16px;\">OTA Insight · Ghent, Belgium<\u002Fdiv>\n          <p style=\"font-size:15px; line-height:1.6; color:#44474d; margin:0 0 18px;\">Part of a specialist team maintaining and scaling a business-critical network of web crawlers running against a diverse range of complex, dynamic sites. Engineered custom high-performance Scrapy middleware for pub/sub queue management, advanced anti-bot countermeasures and resilient proxy/header rotation. Contributed to architectural planning and code reviews, and led internal monitoring, metrics and real-time alerting tooling.<\u002Fp>\n          <div style=\"display:flex; flex-wrap:wrap; gap:8px;\">\n            <span style=\"background:rgba(74,93,115,0.1); color:#4A5D73; font-size:12px; font-weight: -weight:600; letter-spacing:0.04em; text-transform:uppercase; padding:5px 11px; border-radius:6px;\">PostgreSQL<\u002Fspan>\n            <span style=\"background:rgba(74,93,115,0.1); color:#4A5D73; font-size:12px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; padding:5px 11px; border-radius:6px;\">Odoo ERP<\u002Fspan>\n            <span style=\"background:rgba(74,93,115,0.1); color:#4A5D73; font-size:12px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; padding:5px 11px; border-radius:6px;\">Migration<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#fff; border:1px solid #E2E2E2; border-radius:16px; padding:32px; box-shadow:0 4px 12px rgba(26,43,66,0.05);\">\n          <div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:16px; flex-wrap:wrap;\">\n            <h3 style=\"font-family:'Playfair Display',serif; font-size:23px; font-weight:600; color:#04162c; margin:0;\">Lead Frontend Engineer &amp; Co-founder<\u002Fh3>\n            <span style=\"font-size:14px; font-weight:600; color:#A68966; white-space:nowrap;\">2015 — 2017<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:14px; font-weight:600; letter-spacing:0.03em; color:#4A5D73; margin:6px 0 16px;\">Timtul · Barcelona, Spain<\u002Fdiv>\n          <p style=\"font-size:15px; line-height:1.6; color:#44474d; margin:0 0 18px;\">Co-founded and architected a comprehensive full-stack platform for associations — still in use today — letting administrators manage thousands of members, their responsive website and all communication processes. Personally built the core web and mail builder tools from scratch on a Django backend with a custom jQuery-based client-side framework.<\u002Fp>\n          <div style=\"display:flex; flex-wrap:wrap; gap:8px;\">\n            <span style=\"background:rgba(74,93,115,0.1); color:#4A5D73; font-size:12px; font-weight:600; letter-spacing:0.04em; text-transform:uppe
